name: arXiv gr-qc Daily Digest

on:
  schedule:
    - cron: '00 04 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD, e.g. 2026-07-02). Leave empty for yesterday.'
        required: false
        default: ''

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Calculate date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            OVERRIDE="${{ github.event.inputs.date }}"
            YESTERDAY=$(echo "$OVERRIDE" | sed 's/-//g')
            YESTERDAY_DISPLAY=$(echo "$OVERRIDE" | sed 's/-/年/;s/-/月/')日
          else
            YESTERDAY=$(TZ='Asia/Shanghai' date -d 'yesterday' '+%Y%m%d')
            YESTERDAY_DISPLAY=$(TZ='Asia/Shanghai' date -d 'yesterday' '+%Y年%m月%d日')
          fi
          echo "api_date=$YESTERDAY" >> $GITHUB_OUTPUT
          echo "display_date=$YESTERDAY_DISPLAY" >> $GITHUB_OUTPUT
          echo "Date: $YESTERDAY ($YESTERDAY_DISPLAY)"

      - name: Fetch papers from arXiv
        run: |
          python scripts/fetch_papers.py ${{ steps.date.outputs.api_date }} ./outputs/
        continue-on-error: true

      - name: Check if papers exist
        id: check
        run: |
          if [ -f "./outputs/all-papers.json" ]; then
            COUNT=$(python -c "import json; print(len(json.load(open('./outputs/all-papers.json'))))")
            echo "paper_count=$COUNT" >> $GITHUB_OUTPUT
            echo "Found $COUNT papers"
          else
            echo "paper_count=0" >> $GITHUB_OUTPUT
            echo "No papers found"
          fi

      - name: Translate and evaluate (batch 1)
        if: steps.check.outputs.paper_count != '0'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/translate_cloud.py ./outputs/all-papers.json --batch-size 5 --batch-start 0

      - name: Translate and evaluate (batch 2)
        if: steps.check.outputs.paper_count != '0'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          COUNT=${{ steps.check.outputs.paper_count }}
          if [ "$COUNT" -gt 5 ]; then
            python scripts/translate_cloud.py ./outputs/all-papers.json --batch-size 5 --batch-start 5
          fi

      - name: Translate and evaluate (batch 3)
        if: steps.check.outputs.paper_count != '0'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          COUNT=${{ steps.check.outputs.paper_count }}
          if [ "$COUNT" -gt 10 ]; then
            python scripts/translate_cloud.py ./outputs/all-papers.json --batch-size 5 --batch-start 10
          fi

      - name: Translate and evaluate (batch 4)
        if: steps.check.outputs.paper_count != '0'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          COUNT=${{ steps.check.outputs.paper_count }}
          if [ "$COUNT" -gt 15 ]; then
            python scripts/translate_cloud.py ./outputs/all-papers.json --batch-size 5 --batch-start 15
          fi

      - name: Generate HTML report
        if: steps.check.outputs.paper_count != '0'
        run: |
          HTML_FILE="./outputs-public/arxiv-gr-qc-${{ steps.date.outputs.api_date }}.html"
          mkdir -p ./outputs-public
          python scripts/build_html.py ./outputs/all-papers.json "$HTML_FILE" "${{ steps.date.outputs.display_date }}"
          # Always update latest.html
          cp "$HTML_FILE" ./outputs-public/latest.html
          echo "html_file=$HTML_FILE" >> $GITHUB_OUTPUT
        id: html

      - name: Generate summary for push
        if: steps.check.outputs.paper_count != '0'
        env:
          PAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest.html
          DATE_DISPLAY: ${{ steps.date.outputs.display_date }}
        run: |
          python -c "
          import json, re, os

          with open('./outputs/all-papers.json', 'r', encoding='utf-8') as f:
              papers = json.load(f)

          primary = [p for p in papers if p.get('PrimaryCat') == 'gr-qc']
          cross = [p for p in papers if p.get('PrimaryCat') != 'gr-qc']
          ordered = primary + cross

          def one_liner(s):
              if not s: return ''
              m = re.match(r'^(.*?[。；])', s)
              return (m.group(1) if m else s[:60])[:80]

          def esc(s):
              return s.replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')

          page_url = os.environ.get('PAGE_URL', '#')
          date_display = os.environ.get('DATE_DISPLAY', '')

          lines = [f'<h3>arXiv gr-qc 日报 | {date_display}</h3>']
          lines.append(f'<p>共 <b>{len(ordered)}</b> 篇（gr-qc主分类 {len(primary)} + 交叉 {len(cross)}）<br>')
          lines.append(f'<a href=\"{page_url}\">查看完整 HTML 报告（含公式和详细评价）</a></p>')
          lines.append('<hr>')

          for i, p in enumerate(ordered, 1):
              cn_title = esc(p.get('CN_Title', p.get('Title', '')))
              onel = esc(one_liner(p.get('CN_Eval', '')).replace('研究问题', '速览', 1))
              cross_tag = ' ↻' if p.get('PrimaryCat') != 'gr-qc' else ''
              lines.append(f'<p><b>{i}.{cross_tag} {cn_title}</b><br><span style=\"color:#666\">{onel}</span></p>')

          with open('./outputs/summary.html', 'w', encoding='utf-8') as f:
              f.write(''.join(lines))
          "

      - name: Clean up intermediate files
        if: steps.check.outputs.paper_count != '0'
        run: |
          rm -f ./outputs/all-papers.json ./outputs/raw-data.xml

      - name: Send PushPlus notification
        if: success() && steps.check.outputs.paper_count != '0'
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          CONTENT=$(cat ./outputs/summary.html)
          TITLE="arXiv gr-qc | ${{ steps.date.outputs.display_date }}"

          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${PUSHPLUS_TOKEN}\",\"title\":\"${TITLE}\",\"content\":$(echo "$CONTENT" | python -c "import sys,json; print(json.dumps(sys.stdin.read()))"),\"template\":\"html\"}"

          # Also push to topic group
          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${PUSHPLUS_TOKEN}\",\"title\":\"${TITLE}\",\"content\":$(echo "$CONTENT" | python -c "import sys,json; print(json.dumps(sys.stdin.read()))"),\"template\":\"html\",\"topic\":\"arxiv-gr-qc\"}"

      - name: Setup Pages
        if: steps.check.outputs.paper_count != '0'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.check.outputs.paper_count != '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./outputs-public

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.paper_count != '0'
        uses: actions/deploy-pages@v4

      - name: No papers notification
        if: steps.check.outputs.paper_count == '0'
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          DATE_DISPLAY="${{ steps.date.outputs.display_date }}"
          MSG="arXiv gr-qc ${DATE_DISPLAY}：没更新"
          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${PUSHPLUS_TOKEN}\",\"title\":\"arXiv gr-qc | ${DATE_DISPLAY}\",\"content\":\"${MSG}\"}"
          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${PUSHPLUS_TOKEN}\",\"title\":\"arXiv gr-qc | ${DATE_DISPLAY}\",\"content\":\"${MSG}\",\"topic\":\"arxiv-gr-qc\"}"
